name: Build App windows

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: [self-hosted, Windows]

    steps:
      # ✅ Move to your actual Megacity folder
      - name: Go to Megacity project
        run: |
          cd C:\Users\ibuser\Documents\UnityProject\megacity-metro  # 🔴 CHANGE THIS to your actual path
          git fetch origin
          # git reset --hard origin/main

      # ✅ Clean previous build
      - name: Clean build folder
        run: |
          cd C:\Users\ibuser\Documents\UnityProject\megacity-metro
          rm -rf Builds/App || true

      # ✅ Run Unity build
      - name: Run Unity Build
        run: |
          cd C:\Users\ibuser\Documents\UnityProject\megacity-metro

          "C:\Program Files\Unity\Hub\Editor\2020.3.34f1\Editor\Unity.exe" \
          -batchmode -nographics -quit \
          -projectPath . \
          -buildTarget StandaloneWindows64 \
          -executeMethod BuildApp.Build \
          -logFile build.log

      # ✅ Show log (very useful)
      - name: Show log
        if: always()
        run: |
          cd C:\Users\ibuser\Documents\UnityProject\megacity-metro
          cat build.log || true

      # ✅ Verify output
      - name: Show build result
        run: |
          cd C:\Users\ibuser\Documents\UnityProject\megacity-metro
          ls -la Builds/App/ || true
